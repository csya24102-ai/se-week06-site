<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介サイト</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #222;
      line-height: 1.8;
    }

    header {
      background: linear-gradient(135deg, #5b6ee1, #8b5cf6);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    header h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1rem;
    }

    main {
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
    }

    section {
      background: white;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      color: #5b6ee1;
      font-size: 1.8rem;
      margin-bottom: 20px;
      border-left: 6px solid #8b5cf6;
      padding-left: 12px;
    }

    .profile {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .icon {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #ddd6fe;
      color: #5b21b6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      flex-shrink: 0;
    }

    .profile-text h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .profile-text p {
      margin-bottom: 12px;
    }

    footer {
      text-align: center;
      color: #666;
      padding: 30px;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 1.9rem;
      }

      section {
        padding: 25px 20px;
      }

      .profile {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>自己紹介サイト</h1>
    <p>自分について紹介するページです</p>
  </header>

  <main>
    <section id="about">
      <h2>About</h2>

      <div class="profile">
        <div class="icon">☺</div>

        <div class="profile-text">
          <h3>名前：柳橋 雄太</h3>

          <p>
            私は、Pythonなどのプログラミングに興味があります。
            授業を通してHTMLやCSSを学び、Webページを作成しました。
          </p>

          <p>
            趣味はゲームをすることや動画を見ることです。
          </p>

          <p>
            これからも少しずつ知識を増やして、このWebページをアップデートしていきたいです。
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 自己紹介サイト</p>
  </footer>
</body>
</html>
